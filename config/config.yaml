input:
  category: "SURFACE"
  base_url: "https://legacy.bas.ac.uk/met/READER/ANTARCTIC_METEOROLOGICAL_DATA/SURFACE/"
  files:
    - "Amundsen_Scott_surface.dat"


output:
  folder: "data/"

schedule:
  enabled: false
  interval_seconds: 30

state:
  file: "data/processed_files.json"


metadata:
  station:
    latitude:
      standard_name: "latitude"
      long_name: "latitude"
      units: "degrees_north"

    longitude:
      standard_name: "longitude"
      long_name: "longitude"
      units: "degrees_east"

    height:
      standard_name: "height"
      long_name: "station height"
      units: "m"
      positive: "up"
      axis: "Z"

  global:
    title: "{station_name} surface meteorological observations"
    summary: "Historical surface meteorological observations from {station_name}, provided through the BAS READER Antarctic Meteorological Data service."
    institution: "British Antarctic Survey"

    keywords: "GCMDSK: EARTH SCIENCE > ATMOSPHERE > ATMOSPHERIC TEMPERATURE > SURFACE TEMPERATURE, Antarctica, surface meteorology"
    keywords_vocabulary: "GCMDSK: GCMD Science Keywords: https://gcmd.earthdata.nasa.gov/kms/concepts/concept_scheme/sciencekeywords"
    license: "http://spdx.org/licenses/CC-BY-4.0 (CC-BY-4.0)"
    geospatial_bounds_crs: "EPSG:4326"

    creator_type: "person"
    creator_name: "Steve Colwell"
    creator_email: "src@bas.ac.uk"
    creator_url: "https://www.bas.ac.uk/profile/src/"
    creator_institution: "British Antarctic Survey"

    publisher_type: "institution"
    publisher_name: "Norwegian Meteorological Institute/Arctic Data Centre (NO/MET/ADC)"
    publisher_email: "adc-support@met.no"
    publisher_url: "https://adc.met.no/"
    publisher_institution: "Norwegian Meteorological Institute"

    contributor_type: "person"
    contributor_name: "Nellie Isaksen"
    contributor_email: "neisa5386@met.no"
    contributor_url: ""
    contributor_institution: "Norwegian Meteorological Institute"
    contributor_role: "metadata author"

    Conventions: "CF-1.11, ACDD-1.3"
    featureType: "timeSeries"
    source: "Original source data provided by the British Antarctic Survey READER Antarctic Meteorological Data service"

    comment: "Historical Antarctic meteorological observations. Missing values and observational completeness may vary"
    project: "READER Antarctic Data for Environmental Research"
    history: "Dataset is continuously updated as new observations become available" 

  variables:
    temperature:
      long_name: "Air temperature"
      standard_name: "air_temperature"
      units: "degC"
      units_metadata: "temperature: on_scale"
      coverage_content_type: "physicalMeasurement"

    sea_pressure:
      long_name: "Sea level pressure"
      standard_name: "air_pressure_at_sea_level"
      units: "hPa"
      coverage_content_type: "physicalMeasurement"

    station_pressure:
      long_name: "Station pressure"
      standard_name: "air_pressure"
      units: "hPa"
      coverage_content_type: "physicalMeasurement"

    wind_speed:
      long_name: "Wind speed"
      standard_name: "wind_speed"
      units: "knots"
      coverage_content_type: "physicalMeasurement"

    wind_direction:
      long_name: "Wind direction"
      standard_name: "wind_from_direction"
      units: "degrees"
      coverage_content_type: "physicalMeasurement"
